{% extends "base.html" %}
{% block content %}
  <!-- heading for the summary section -->
  <h2>🌟 Exploration summary</h2>
  <!-- list showing known and unknown flashcards -->
  <ul class="list-group mb-4">
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <!-- label for known flashcards -->
      <span>✅ Explored stars</span>
      <!-- badge showing number of known flashcards -->
      <span class="badge bg-primary rounded-pill">{{ stats.get('known', 0) }}</span>
    </li>
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <!-- label for unknown flashcards -->
      <span>🚀 Unexplored territory</span>
      <!-- badge showing number of unknown flashcards -->
      <span class="badge bg-warning rounded-pill">{{ stats.get('unknown', 0) }}</span>
    </li>
  </ul>

  <!-- form for restarting learning progress -->
  <div class="d-flex gap-3 mb-4">
    <form method="post" action="{{ url_for('learn', set_id=set_id) }}">
      <!-- hidden input to keep track of learning mode -->
      <input type="hidden" name="mode" value="{{ session.get('mode', 'sequential') }}">
      <!-- button to restart all cards -->
      <button type="submit" name="restart" value="all" class="btn btn-primary">🔄 Restart mission</button>
      <!-- button to restart only cards not yet known -->
      <button type="submit" name="restart" value="to_learn" class="btn btn-warning">🚀 Explore unknown</button>
    </form>
  </div>

  <!-- form to go back to the main set view -->
  <form method="get" action="{{ url_for('view_set', set_id=set_id) }}">
    <button type="submit" class="btn btn-secondary">⬅️ Back to constellation</button>
  </form>
{% endblock %}
