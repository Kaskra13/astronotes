{% extends "base.html" %}
{% block content %}
  <!-- heading for learning style selection -->
  <h2>🚀 Choose exploration mode</h2>
  <form method="post" class="d-flex flex-column gap-3">

    <div>
      <!-- section for selecting subset of cards -->
      <label class="form-label d-block">📋 Star selection</label>
      <div class="form-check">
        <!-- radio button for all cards -->
        <input class="form-check-input" type="radio" name="subset" id="subset-all" value="all" checked>
        <label class="form-check-label" for="subset-all">🌌 All stars</label>
      </div>
      <div class="form-check">
        <!-- radio button for unknown cards only -->
        <input class="form-check-input" type="radio" name="subset" id="subset-unknown" value="unknown">
        <label class="form-check-label" for="subset-unknown">🚀 Explore unknown territory</label>
      </div>
    </div>

    <div>
      <!-- section for selecting learning mode -->
      <label class="form-label d-block">🔄 Exploration order</label>
      <div class="form-check form-check-inline">
        <!-- radio button for sequential mode -->
        <input class="form-check-input" type="radio" name="mode" id="mode-sequential" value="sequential" checked>
        <label class="form-check-label" for="mode-sequential">⭐ Star-by-star (in sequence)</label>
      </div>
      <div class="form-check form-check-inline">
        <!-- radio button for random mode -->
        <input class="form-check-input" type="radio" name="mode" id="mode-random" value="random">
        <label class="form-check-label" for="mode-random">🌀 Cosmic shuffle (random)</label>
      </div>
    </div>

    <div class="d-flex gap-3">
      <!-- submit button to start learning -->
      <button type="submit" class="btn btn-primary">🚀 Start exploration</button>
    </div>
  </form>
  
  <!-- form to go back to the set view -->
  <form method="get" action="{{ url_for('view_set', set_id=set_id) }}" class="mt-3">
    <button type="submit" class="btn btn-secondary">⬅️ Back to constellation</button>
  </form>
{% endblock %}
